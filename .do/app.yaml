name: meridian-home-watch
region: nyc
services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/meridian-home-watch
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm run start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
    http_port: 3000
    routes:
      - path: /
